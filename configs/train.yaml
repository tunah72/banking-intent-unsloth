# configs/train.yaml
model_name: "unsloth/Llama-3.1-8B-bnb-4bit"
max_seq_length: 128
num_labels: 77
use_gradient_checkpointing: "unsloth"  # saves ~30% VRAM, fits 2x larger batches

lora_r: 16
lora_alpha: 32
lora_dropout: 0  # 0 is optimized per Unsloth docs
target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

training_args:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  num_train_epochs: 5
  output_dir: "checkpoints"
  eval_strategy: "steps"
  eval_steps: 50
  save_strategy: "steps"
  save_steps: 50
  logging_steps: 10
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_accuracy"
  greater_is_better: true
  optim: "adamw_8bit"
  weight_decay: 0.01
  lr_scheduler_type: "linear"
  warmup_ratio: 0.05
  seed: 42
